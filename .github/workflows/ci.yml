name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Run pytest
        run: pytest

  security:
    name: security gate (self-scan)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write  # required to upload SARIF to code scanning
      pull-requests: write    # required to post the report as a PR comment
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install scanners
        run: |
          set -euxo pipefail
          # Trivy (official install script)
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          # grype (official Anchore install script)
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          # gitleaks (pinned release binary)
          GITLEAKS_VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          # hadolint (latest release binary)
          sudo curl -sSfL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 -o /usr/local/bin/hadolint
          sudo chmod +x /usr/local/bin/hadolint
          # checkov (PyPI)
          pip install checkov
          # zizmor (pipeline security, PyPI)
          pip install zizmor
          # actionlint (pipeline correctness, pinned release binary)
          ACTIONLINT_VERSION=1.7.7
          curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" | tar -xz -C /tmp actionlint
          sudo install /tmp/actionlint /usr/local/bin/actionlint
          # OpenSSF Scorecard (supply-chain posture, pinned release binary)
          SCORECARD_VERSION=5.5.0
          curl -sSfL "https://github.com/ossf/scorecard/releases/download/v${SCORECARD_VERSION}/scorecard_${SCORECARD_VERSION}_linux_amd64.tar.gz" | tar -xz -C /tmp scorecard
          sudo install /tmp/scorecard /usr/local/bin/scorecard

      - name: Install repo-analyzer
        run: pip install -e .

      - name: Run the gate (repo-analyzer scans itself)
        # GITHUB_AUTH_TOKEN lets OpenSSF Scorecard query this repo's posture via the API.
        env:
          GITHUB_AUTH_TOKEN: ${{ github.token }}
        run: repo-analyzer . --output-dir repo-analyzer-report

      - name: Upload SARIF to code scanning
        if: always()  # publish findings even when the gate fails the job
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        with:
          sarif_file: repo-analyzer-report/report.sarif

      - name: Upload report bundle (html/md/json + raw)
        id: bundle
        if: always()  # keep the artifact even when the gate fails
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: repo-analyzer-report
          path: repo-analyzer-report/

      - name: Comment the report on the PR
        if: always() && github.event_name == 'pull_request'  # post even when the gate fails
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          ARTIFACT_URL: ${{ steps.bundle.outputs.artifact-url }}
        # --edit-last + --create-if-none keep a single sticky comment instead of spamming each push.
        # Append a link to the artifact so reviewers can grab the full HTML dashboard + raw output.
        run: |
          {
            cat repo-analyzer-report/report.md
            printf '\n---\n'
            printf '📊 **Full HTML dashboard + raw scanner output**: download the **repo-analyzer-report** artifact from [this run](%s).\n' "$ARTIFACT_URL"
          } > /tmp/pr-comment.md
          gh pr comment "$PR" --body-file /tmp/pr-comment.md --edit-last --create-if-none

      # --- Demo report for GitHub Pages (main only) ---
      # Scans the deliberately-vulnerable demo fixture so the public demo shows
      # findings across every domain. Scanners are already installed above.
      - name: Build the demo report for Pages
        if: github.ref == 'refs/heads/main'
        run: |
          repo-analyzer tests/fixtures/demo-app --no-gate --output-dir _site --format html,json,markdown
          cp _site/report.html _site/index.html
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site

  deploy-pages:
    name: deploy demo to Pages
    needs: security
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write      # deploy to Pages
      id-token: write   # OIDC token the deploy action verifies
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
